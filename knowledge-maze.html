<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="robots"
    content="noindex, nofollow"
  >

  <title>Knowledge Maze | RD Quarters</title>

  <style>
    :root {
      --black: #050504;
      --dark: #100e09;
      --panel: #19150d;
      --gold: #ddb24c;
      --light-gold: #f2d487;
      --cream: #f3e7c9;
      --muted: #a99b7c;
      --border: rgba(221, 178, 76, 0.5);
      --dim-border: rgba(221, 178, 76, 0.22);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;

      background:
        radial-gradient(
          circle at 50% 10%,
          rgba(221, 178, 76, 0.14),
          transparent 30rem
        ),
        var(--black);

      color: var(--cream);
      font-family: Georgia, "Times New Roman", serif;
      line-height: 1.65;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(5, 5, 4, 0.96);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      max-width: 1100px;
      margin: auto;
      padding: 16px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .brand {
      color: var(--gold);
      font-weight: bold;
      letter-spacing: 0.18em;
    }

    .return-link {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 0.9rem;
    }

    .hero {
      padding: 80px 24px 55px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .eyebrow,
    .section-label {
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.26em;
      font-size: 0.76rem;
    }

    h1 {
      color: var(--light-gold);
      font-size: clamp(3rem, 11vw, 6rem);
      line-height: 0.96;
      margin: 18px 0 24px;
    }

    .hero-description {
      max-width: 760px;
      margin: auto;
      color: var(--muted);
      font-size: 1.06rem;
    }

    main {
      width: min(1100px, calc(100% - 40px));
      margin: auto;
      padding: 55px 0 85px;
    }

    .status-panel {
      border: 1px solid var(--border);
      border-radius: 24px;

      background:
        linear-gradient(
          145deg,
          rgba(221, 178, 76, 0.08),
          transparent 55%
        ),
        var(--panel);

      padding: 28px;
      margin-bottom: 34px;
    }

    .status-title {
      color: var(--light-gold);
      font-size: 1.7rem;
      margin: 9px 0 20px;
    }

    .progress-track {
      height: 14px;
      background: #090805;
      border: 1px solid var(--dim-border);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(
        90deg,
        #8e6a18,
        var(--gold),
        var(--light-gold)
      );
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .maze-core {
      position: relative;
      min-height: 470px;
      border: 1px solid var(--border);
      border-radius: 32px;
      background:
        radial-gradient(
          circle at center,
          rgba(221, 178, 76, 0.12),
          transparent 15rem
        ),
        #090805;
      overflow: hidden;
      margin-bottom: 34px;
    }

    .maze-line {
      position: absolute;
      background: var(--dim-border);
      transform-origin: left center;
      height: 1px;
    }

    .line-one {
      width: 32%;
      left: 18%;
      top: 33%;
      transform: rotate(24deg);
    }

    .line-two {
      width: 32%;
      right: 18%;
      top: 33%;
      transform: rotate(-24deg);
    }

    .line-three {
      width: 30%;
      left: 20%;
      bottom: 29%;
      transform: rotate(-22deg);
    }

    .line-four {
      width: 30%;
      right: 20%;
      bottom: 29%;
      transform: rotate(22deg);
    }

    .brain-core {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 170px;
      height: 170px;
      transform: translate(-50%, -50%);
      border: 2px solid var(--gold);
      border-radius: 50%;
      display: grid;
      place-items: center;
      text-align: center;
      box-shadow:
        0 0 0 16px rgba(221, 178, 76, 0.04),
        0 0 60px rgba(221, 178, 76, 0.12);
    }

    .brain-core strong {
      display: block;
      color: var(--light-gold);
      font-size: 1.4rem;
    }

    .brain-core span {
      display: block;
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.15em;
